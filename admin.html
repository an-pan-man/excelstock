<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>관리자</title>
  <style>:root{--accent:#107c41;--line:#d3dae0;--ink:#1f2a24;--muted:#6b7680;--bad:#b3261e}*{box-sizing:border-box}body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:20px;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Apple SD Gothic Neo,Malgun Gothic,sans-serif;background:#f1f3f5;color:var(--ink)}.gate{width:100%;max-width:360px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:22px 20px;box-shadow:0 8px 30px #0f172a14}h1{font-size:17px;margin:0 0 4px}p.sub{font-size:12px;color:var(--muted);margin:0 0 16px;line-height:1.5}label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:0 0 5px}input[type=password]{width:100%;height:40px;border:1px solid var(--line);border-radius:8px;padding:0 11px;font:inherit;font-size:14px}input[type=password]:focus{outline:none;border-color:var(--accent)}.row-check{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin:10px 0 14px}button{width:100%;height:40px;border:0;border-radius:8px;background:var(--accent);color:#fff;font:inherit;font-weight:700;font-size:14px;cursor:pointer}button:disabled{opacity:.6;cursor:default}.msg{min-height:18px;margin-top:12px;font-size:12px;color:var(--bad);line-height:1.5}.msg.busy{color:var(--muted)}
</style>
</head>
<body>
  <main class="gate">
    <h1>관리자</h1>
    <p class="sub">토큰을 입력하면 관리 도구를 불러옵니다. 같은 탭에서는 자동으로 다시 불러옵니다.</p>
    <form id="gateForm" autocomplete="off">
      <label for="tok">관리자 토큰</label>
      <input id="tok" type="password" autocomplete="off" spellcheck="false" placeholder="관리자 토큰" required>
      <label class="row-check"><input id="remember" type="checkbox"> 이 기기에 토큰 저장</label>
      <button id="go" type="submit">들어가기</button>
    </form>
    <div class="msg" id="msg" role="status" aria-live="polite"></div>
  </main>
  <script>(function(){try{if(location.hostname==="excelkospi.github.io"){location.replace("https://excelkospi.pages.dev/admin");return}}catch{}var TOKEN_KEY="excelkospi_admin_token_session",REMEMBER_KEY="excelkospi_admin_token_trusted_device",form=document.getElementById("gateForm"),input=document.getElementById("tok"),remember=document.getElementById("remember"),go=document.getElementById("go"),msg=document.getElementById("msg"),WORKER_API="https://excelkospi-api.alaala3.workers.dev",remembered="",sessionToken="";try{remembered=localStorage.getItem(REMEMBER_KEY)||""}catch{}try{sessionToken=sessionStorage.getItem(TOKEN_KEY)||""}catch{}var autoToken=remembered||sessionToken;autoToken&&(input.value=autoToken,remember.checked=!!remembered);function setMsg(text,busy){msg.textContent=text||"",msg.className="msg"+(busy?" busy":"")}function friendly(code,status){return code==="admin_token_not_configured"||status===503?"서버에 관리자 토큰이 설정되어 있지 않습니다.":status===401||code==="unauthorized"?"토큰이 올바르지 않습니다.":status===429?"시도가 너무 많습니다. 잠시 후 다시 시도하세요.":"불러오지 못했습니다. 잠시 후 다시 시도하세요."}async function loadApp(){var res=await fetch("/api/admin/app",{method:"POST",cache:"no-store",credentials:"same-origin"});if(!res.ok){var err={};try{err=await res.json()}catch{}throw Object.assign(new Error(err.error||"unauthorized"),{status:res.status,code:err.error})}var html=await res.text();document.open(),document.write(html),document.close()}async function enter(tokenValue){var value=String(tokenValue||"").trim();if(!value){setMsg("토큰을 입력하세요.");return}go.disabled=!0,setMsg("확인 중…",!0);try{var res=await fetch("/api/admin/session",{method:"POST",headers:{authorization:"Bearer "+value},cache:"no-store",credentials:"same-origin"});if(!res.ok){var data={};try{data=await res.json()}catch{}if(res.status===401)try{sessionStorage.removeItem(TOKEN_KEY)}catch{}setMsg(friendly(data.error,res.status)),go.disabled=!1;return}try{sessionStorage.setItem(TOKEN_KEY,value)}catch{}try{remember.checked?localStorage.setItem(REMEMBER_KEY,value):localStorage.removeItem(REMEMBER_KEY)}catch{}await fetch(WORKER_API+"/api/admin/session",{method:"POST",headers:{authorization:"Bearer "+value},cache:"no-store",credentials:"include"}).catch(function(){}),await loadApp()}catch(e){setMsg(friendly(e.code,e.status)),go.disabled=!1}}form.addEventListener("submit",function(ev){ev.preventDefault(),enter(input.value)}),autoToken?enter(autoToken):fetch("/api/admin/session",{cache:"no-store",credentials:"same-origin"}).then(function(res){if(res.ok)return loadApp()}).catch(function(){})})();
</script>
</body>
</html>
